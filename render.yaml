databases:
  - name: giras-db
    databaseName: giras
    user: giras
    plan: free

services:
  - type: web
    name: giras-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: giras-db
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        value: https://giras-web.onrender.com
      - key: FISCAL_EMIT_ENABLED
        value: false
      - key: FOCUS_NFE_BASE_URL
        value: https://api.focusnfe.com.br/v2

  - type: web
    name: giras-web
    runtime: static
    rootDir: frontend
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://giras-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
